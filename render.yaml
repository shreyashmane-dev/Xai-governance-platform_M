services:
  - type: web
    name: xai-governance-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --keep-alive 5 --log-level info --access-logfile - --error-logfile -
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: MONGO_DB_NAME
        value: xai_platform
      - key: BACKEND_CORS_ORIGINS
        # Set to "*" to allow all origins, or comma-separate specific domains:
        # e.g. https://myapp.vercel.app,https://admin.myapp.com
        value: "*"
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: API_KEY
        # Optional: set a secret key to protect /api/* routes
        sync: false
